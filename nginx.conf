server {
    listen 80;
    server_name _;

    # 前端静态资源
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # 反向代理后端 API（避免前端跨域）
    location /api/ {
        proxy_pass         http://rag-backend:8000/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;      # 大文件上传时不超时
        client_max_body_size 200M;    # 最大上传大小
    }

    # 健康检查透传
    location /health {
        proxy_pass http://rag-backend:8000/health;
    }
}
